"$schema" = 'https://starship.rs/config-schema.json'
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$git_ahead_behind\
$golang\
$nodejs\
$python\
$cmd_duration\
$line_break\
$character"""

# =============================================================================
# Prompt
# =============================================================================

[character]
success_symbol = "[❯](mauve)"
error_symbol = "[❯](red)"

[line_break]
disabled = false

# =============================================================================
# Directory
# =============================================================================

[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue"

# =============================================================================
# Git
# =============================================================================

[git_branch]
symbol = " "
style = "mauve"

[git_status]
style = "red"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "⇕↑${ahead_count}↓${behind_count}"
untracked = "?"
modified = "!"
staged = "✓"
renamed = "➜"
deleted = "✗"

# =============================================================================
# Runtimes
# =============================================================================

[golang]
symbol = "🐹 "
style = "sky"
format = "[$symbol$version]($style) "

[nodejs]
symbol = "🟩 "
style = "green"
format = "[$symbol$version]($style) "
detect_files = ["bun.lock", "package.json"]

[python]
symbol = "🐍 "
style = "yellow"
format = "[$symbol$version]($style) "
detect_files = [
    "requirements.txt",
    "Pipfile",
    "pyproject.toml",
    ".python-version",
]

# =============================================================================
# Command Duration
# =============================================================================

[cmd_duration]
min_time = 2_000

style = "yellow"
format = "[$duration]($style) "

# =============================================================================
# Disabled Modules
# =============================================================================

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[battery]
disabled = true

[time]
disabled = true

